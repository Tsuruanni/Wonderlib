name: readeng_admin
description: Admin panel for ReadEng content management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.4

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Shared
  readeng_shared:
    path: ../packages/readeng_shared

  # Utilities
  dartz: ^0.10.1
  equatable: ^2.0.7
  uuid: ^4.5.1
  csv: ^6.0.0

  # UI
  cached_network_image: ^3.4.1
  file_picker: ^8.3.7

  # HTTP client for ElevenLabs API
  http: ^1.3.0

  # Environment variables
  flutter_dotenv: ^5.2.1

  # Audio preview
  just_audio: ^0.9.40

  # URL launcher
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
  assets:
    - .env
