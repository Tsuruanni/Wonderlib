name: owlio_admin
description: Admin panel for Owlio content management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.4

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # SVG rendering
  flutter_svg: ^2.0.9

  # Routing
  go_router: ^14.8.1

  # Shared
  owlio_shared:
    path: ../packages/owlio_shared

  # Utilities
  dartz: ^0.10.1
  equatable: ^2.0.7
  uuid: ^4.5.1
  csv: ^6.0.0

  # UI
  cached_network_image: ^3.4.1
  file_picker: ^8.3.7
  universal_html: ^2.2.4

  http: ^1.3.0

  # Environment variables
  flutter_dotenv: ^5.2.1

  # Audio preview
  just_audio: ^0.9.40

  # URL launcher
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/rank-bronze-1_large.png
    - assets/icons/rank-silver-2_large.png
    - assets/icons/rank-gold-3_large.png
    - assets/icons/rank-platinum-5_large.png
    - assets/icons/rank-diamond-7_large.png
    - assets/import_templates/vocabulary_template.csv
    - assets/import_templates/users_template.csv
    - assets/import_templates/wordlist_template.csv
    - assets/import_templates/book_template.json
