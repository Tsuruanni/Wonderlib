<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" fill="none">
  <!-- Soft background glow -->
  <circle cx="230" cy="180" r="150" fill="#58CC02" opacity="0.06"/>
  <circle cx="230" cy="180" r="110" fill="#FFC800" opacity="0.05"/>

  <!-- === MAIN OPEN BOOK === -->
  <!-- Book shadow -->
  <ellipse cx="230" cy="290" rx="140" ry="20" fill="#4B4B4B" opacity="0.08"/>

  <!-- Left page -->
  <path d="M80,80 Q80,72 88,72 L222,72 L222,275 L88,275 Q80,275 80,267 Z" fill="white" stroke="#E0E0E0" stroke-width="2"/>
  <!-- Right page -->
  <path d="M238,72 L372,72 Q380,72 380,80 L380,267 Q380,275 372,275 L238,275 Z" fill="white" stroke="#E0E0E0" stroke-width="2"/>

  <!-- Book spine -->
  <rect x="220" y="68" width="20" height="212" rx="4" fill="#58CC02" stroke="#3BA302" stroke-width="2"/>
  <line x1="230" y1="74" x2="230" y2="274" stroke="#3BA302" stroke-width="1.5" opacity="0.5"/>

  <!-- Book cover edges (visible at bottom) -->
  <path d="M76,275 Q76,283 84,283 L376,283 Q384,283 384,275" stroke="#3BA302" stroke-width="3" fill="#58CC02"/>
  <path d="M78,279 Q78,286 86,286 L374,286 Q382,286 382,279" stroke="#2D8200" stroke-width="2" fill="#3BA302"/>

  <!-- Page curl - bottom right -->
  <path d="M365,260 Q370,270 360,275 L372,275 Q380,275 380,267 L380,255 Q374,260 365,260Z" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Left page content - text lines -->
  <line x1="100" y1="100" x2="205" y2="100" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="116" x2="195" y2="116" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="132" x2="200" y2="132" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="148" x2="185" y2="148" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>

  <!-- Left page - highlighted section -->
  <rect x="96" y="162" width="118" height="24" rx="4" fill="#58CC02" opacity="0.12"/>
  <line x1="100" y1="174" x2="205" y2="174" stroke="#58CC02" stroke-width="3" stroke-linecap="round"/>

  <line x1="100" y1="198" x2="195" y2="198" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="214" x2="180" y2="214" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="230" x2="200" y2="230" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="246" x2="165" y2="246" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>

  <!-- Right page content - chapter with illustration placeholder -->
  <line x1="255" y1="100" x2="360" y2="100" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>
  <line x1="255" y1="116" x2="350" y2="116" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>
  <line x1="255" y1="132" x2="355" y2="132" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>

  <!-- Right page - image placeholder -->
  <rect x="260" y="148" width="100" height="65" rx="8" fill="#FFC800" opacity="0.15" stroke="#FFC800" stroke-width="1.5"/>
  <circle cx="285" cy="170" r="10" fill="#FFC800" opacity="0.3"/>
  <path d="M268,205 L290,180 L310,195 L325,182 L352,205 Z" fill="#58CC02" opacity="0.25"/>

  <line x1="255" y1="228" x2="360" y2="228" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>
  <line x1="255" y1="244" x2="340" y2="244" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>
  <line x1="255" y1="260" x2="355" y2="260" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>

  <!-- === CHECKMARK BADGE (on top of book) === -->
  <g transform="translate(335, 65)">
    <!-- Badge circle -->
    <circle cx="0" cy="0" r="32" fill="#58CC02" stroke="#3BA302" stroke-width="3"/>
    <circle cx="0" cy="0" r="26" fill="#58CC02" stroke="#89E219" stroke-width="2"/>
    <!-- Checkmark -->
    <polyline points="-12,2 -4,12 14,-8" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Badge shine -->
    <path d="M-14,-18 Q-8,-22 -2,-18" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- === FLOATING SMALL BOOKS === -->

  <!-- Small book 1 - top left -->
  <g transform="translate(50, 50) rotate(-20)">
    <rect x="0" y="0" width="36" height="28" rx="4" fill="#FFC800" stroke="#D4A600" stroke-width="2"/>
    <line x1="17" y1="4" x2="17" y2="24" stroke="#D4A600" stroke-width="2"/>
    <rect x="2" y="0" width="14" height="28" rx="3" fill="#FFE066"/>
  </g>

  <!-- Small book 2 - top right -->
  <g transform="translate(400, 30) rotate(15)">
    <rect x="0" y="0" width="32" height="26" rx="4" fill="#58CC02" stroke="#3BA302" stroke-width="2"/>
    <line x1="15" y1="4" x2="15" y2="22" stroke="#3BA302" stroke-width="2"/>
    <rect x="2" y="0" width="12" height="26" rx="3" fill="#89E219"/>
  </g>

  <!-- Small book 3 - left floating -->
  <g transform="translate(25, 200) rotate(-8)">
    <rect x="0" y="0" width="30" height="24" rx="3" fill="#4B4B4B" stroke="#333" stroke-width="1.5"/>
    <line x1="14" y1="3" x2="14" y2="21" stroke="#666" stroke-width="1.5"/>
    <rect x="2" y="0" width="11" height="24" rx="2" fill="#666"/>
  </g>

  <!-- Small book 4 - right floating -->
  <g transform="translate(420, 180) rotate(12)">
    <rect x="0" y="0" width="28" height="22" rx="3" fill="#FFC800" stroke="#D4A600" stroke-width="1.5"/>
    <line x1="13" y1="3" x2="13" y2="19" stroke="#D4A600" stroke-width="1.5"/>
    <rect x="2" y="0" width="10" height="22" rx="2" fill="#FFE066"/>
  </g>

  <!-- Book stack - bottom left -->
  <g transform="translate(35, 300)">
    <rect x="0" y="12" width="42" height="8" rx="3" fill="#58CC02" stroke="#3BA302" stroke-width="1.5"/>
    <rect x="-3" y="4" width="42" height="8" rx="3" fill="#FFC800" stroke="#D4A600" stroke-width="1.5"/>
    <rect x="2" y="-4" width="42" height="8" rx="3" fill="#4B4B4B" stroke="#333" stroke-width="1.5"/>
  </g>

  <!-- === DECORATIVE ELEMENTS === -->

  <!-- Sparkle stars -->
  <g transform="translate(100, 35) scale(0.6)">
    <path d="M0,-12 L3,-4 L12,-4 L5,2 L7,12 L0,6 L-7,12 L-5,2 L-12,-4 L-3,-4 Z" fill="#FFC800" stroke="#D4A600" stroke-width="1.5"/>
  </g>
  <g transform="translate(440, 120) scale(0.5)">
    <path d="M0,-12 L3,-4 L12,-4 L5,2 L7,12 L0,6 L-7,12 L-5,2 L-12,-4 L-3,-4 Z" fill="#FFC800" stroke="#D4A600" stroke-width="1.5"/>
  </g>
  <g transform="translate(60, 280) scale(0.4)">
    <path d="M0,-12 L3,-4 L12,-4 L5,2 L7,12 L0,6 L-7,12 L-5,2 L-12,-4 L-3,-4 Z" fill="#FFC800"/>
  </g>

  <!-- Plus sparkles -->
  <g transform="translate(175, 40)" stroke="#58CC02" stroke-width="2.5" stroke-linecap="round">
    <line x1="-5" y1="0" x2="5" y2="0"/>
    <line x1="0" y1="-5" x2="0" y2="5"/>
  </g>
  <g transform="translate(430, 260)" stroke="#FFC800" stroke-width="2" stroke-linecap="round">
    <line x1="-4" y1="0" x2="4" y2="0"/>
    <line x1="0" y1="-4" x2="0" y2="4"/>
  </g>

  <!-- Small dots -->
  <circle cx="20" cy="120" r="3" fill="#FFC800" opacity="0.5"/>
  <circle cx="445" cy="80" r="4" fill="#58CC02" opacity="0.4"/>
  <circle cx="410" cy="320" r="3" fill="#4B4B4B" opacity="0.3"/>
  <circle cx="15" cy="160" r="2.5" fill="#58CC02" opacity="0.6"/>
  <circle cx="160" cy="320" r="3" fill="#FFC800" opacity="0.4"/>
  <circle cx="340" cy="330" r="2" fill="#58CC02" opacity="0.5"/>

  <!-- Diamond sparkles -->
  <rect x="30" y="88" width="6" height="6" rx="1" fill="#FFC800" transform="rotate(45, 33, 91)" opacity="0.6"/>
  <rect x="395" y="145" width="5" height="5" rx="1" fill="#58CC02" transform="rotate(45, 397.5, 147.5)" opacity="0.5"/>

  <!-- Bookmark ribbon on the main book -->
  <g transform="translate(200, 68)">
    <path d="M0,0 L0,40 L7,32 L14,40 L14,0 Z" fill="#FF4B4B" opacity="0.8"/>
  </g>

  <!-- Small pencil floating -->
  <g transform="translate(435, 230) rotate(30) scale(0.7)">
    <rect x="0" y="0" width="8" height="40" rx="2" fill="#FFC800" stroke="#D4A600" stroke-width="1.5"/>
    <polygon points="0,40 8,40 4,50" fill="#FFE066" stroke="#D4A600" stroke-width="1.5"/>
    <rect x="0" y="0" width="8" height="7" rx="2" fill="#FF9600"/>
  </g>
</svg>