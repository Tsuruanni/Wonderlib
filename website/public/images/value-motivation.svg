<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" fill="none">
  <!-- Background glows -->
  <circle cx="230" cy="170" r="140" fill="#FFC800" opacity="0.06"/>
  <circle cx="230" cy="170" r="100" fill="#FF9600" opacity="0.04"/>

  <!-- === TROPHY (center) === -->
  <g transform="translate(230, 120)">
    <!-- Trophy cup -->
    <path d="M-45,-50 L-40,20 Q-38,40 0,45 Q38,40 40,20 L45,-50 Z" fill="#FFC800" stroke="#D4A600" stroke-width="3"/>
    <!-- Trophy inner shine -->
    <path d="M-35,-45 L-32,10 Q-30,30 0,35 Q10,33 15,28 L20,-45 Z" fill="#FFE066" opacity="0.5"/>
    <!-- Trophy handles -->
    <path d="M-45,-35 Q-70,-30 -65,-5 Q-60,20 -40,18" stroke="#D4A600" stroke-width="3" fill="none"/>
    <path d="M45,-35 Q70,-30 65,-5 Q60,20 40,18" stroke="#D4A600" stroke-width="3" fill="none"/>
    <!-- Handle fill -->
    <path d="M-45,-35 Q-70,-30 -65,-5 Q-60,20 -40,18" stroke="#FFC800" stroke-width="1" fill="#FFC800" opacity="0.3"/>
    <path d="M45,-35 Q70,-30 65,-5 Q60,20 40,18" stroke="#FFC800" stroke-width="1" fill="#FFC800" opacity="0.3"/>
    <!-- Trophy base -->
    <rect x="-12" y="45" width="24" height="12" rx="3" fill="#D4A600"/>
    <rect x="-22" y="55" width="44" height="10" rx="4" fill="#D4A600" stroke="#B38B00" stroke-width="1.5"/>
    <!-- Star on trophy -->
    <g transform="translate(0, -15) scale(0.9)">
      <path d="M0,-16 L4,-5 L16,-5 L6,3 L10,16 L0,8 L-10,16 L-6,3 L-16,-5 L-4,-5 Z" fill="#FF9600" stroke="#D47E00" stroke-width="1.5"/>
    </g>
    <!-- Trophy highlight -->
    <path d="M-30,-40 Q-25,-45 -18,-40" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Sparkle rays from trophy -->
  <line x1="230" y1="55" x2="230" y2="40" stroke="#FFC800" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="258" y1="60" x2="268" y2="48" stroke="#FFC800" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="202" y1="60" x2="192" y2="48" stroke="#FFC800" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="275" y1="78" x2="288" y2="72" stroke="#FFC800" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="185" y1="78" x2="172" y2="72" stroke="#FFC800" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- === FIRE / STREAK ICON (left) === -->
  <g transform="translate(72, 100)">
    <!-- Fire outer -->
    <path d="M0,45
      C-28,40 -35,15 -25,-5
      C-20,-15 -15,-25 -10,-35
      C-5,-25 0,-15 5,-25
      C8,-30 5,-40 0,-48
      C12,-38 25,-25 30,-10
      C38,10 30,35 0,45Z"
      fill="#FF9600" stroke="#D47E00" stroke-width="2.5"/>
    <!-- Fire inner -->
    <path d="M0,42
      C-15,38 -22,20 -15,5
      C-10,-5 -5,-12 0,-18
      C5,-10 8,-2 12,5
      C18,18 15,35 0,42Z"
      fill="#FFC800"/>
    <!-- Fire core -->
    <path d="M0,38 C-8,35 -10,22 -5,14 C-2,8 2,5 5,12 C8,20 8,32 0,38Z" fill="#FFE066"/>
    <!-- Fire highlight -->
    <path d="M-10,-10 Q-5,-15 0,-10" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Streak number badge -->
  <g transform="translate(72, 155)">
    <rect x="-18" y="-10" width="36" height="20" rx="10" fill="#FF4B4B" stroke="#D43D3D" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="13">7</text>
  </g>

  <!-- === STAR BADGES (top right) === -->
  <!-- Big star -->
  <g transform="translate(380, 70)">
    <circle cx="0" cy="0" r="28" fill="#FFC800" stroke="#D4A600" stroke-width="2.5"/>
    <path d="M0,-16 L4,-5 L16,-5 L7,2 L10,14 L0,8 L-10,14 L-7,2 L-16,-5 L-4,-5 Z" fill="white" opacity="0.9"/>
  </g>
  <!-- Small star badge -->
  <g transform="translate(420, 120)">
    <circle cx="0" cy="0" r="18" fill="#FF9600" stroke="#D47E00" stroke-width="2"/>
    <path d="M0,-10 L2.5,-3 L10,-3 L4,1.5 L6,9 L0,5 L-6,9 L-4,1.5 L-10,-3 L-2.5,-3 Z" fill="white" opacity="0.9"/>
  </g>
  <!-- Tiny star -->
  <g transform="translate(355, 120)">
    <circle cx="0" cy="0" r="12" fill="#58CC02" stroke="#3BA302" stroke-width="1.5"/>
    <path d="M0,-7 L2,-2 L7,-2 L3,1 L4,6 L0,3.5 L-4,6 L-3,1 L-7,-2 L-2,-2 Z" fill="white" opacity="0.9"/>
  </g>

  <!-- === XP PROGRESS BAR (bottom center) === -->
  <g transform="translate(130, 255)">
    <!-- Bar background -->
    <rect x="0" y="0" width="200" height="24" rx="12" fill="#E8E8E8" stroke="#D0D0D0" stroke-width="2"/>
    <!-- Bar fill -->
    <rect x="2" y="2" width="140" height="20" rx="10" fill="#58CC02"/>
    <!-- Bar shine -->
    <rect x="6" y="5" width="130" height="6" rx="3" fill="#89E219" opacity="0.5"/>
    <!-- XP text -->
    <text x="100" y="17" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="12">350 XP</text>
    <!-- XP badge at end -->
    <circle cx="210" cy="12" r="16" fill="#58CC02" stroke="#3BA302" stroke-width="2"/>
    <text x="210" y="17" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="10">XP</text>
  </g>

  <!-- Level up arrow above XP bar -->
  <g transform="translate(330, 235)">
    <path d="M0,10 L0,-5 L-8,-5 L0,-18 L8,-5 L0,-5" fill="#58CC02" stroke="#3BA302" stroke-width="1.5"/>
  </g>

  <!-- === LEADERBOARD PODIUM (bottom) === -->
  <g transform="translate(230, 310)">
    <!-- 2nd place podium -->
    <rect x="-70" y="0" width="44" height="40" rx="4" fill="#1CB0F6" stroke="#0D8ECF" stroke-width="2"/>
    <text x="-48" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="16">2</text>
    <!-- Silver circle avatar -->
    <circle cx="-48" cy="-12" r="12" fill="#C0C0C0" stroke="#A0A0A0" stroke-width="2"/>
    <circle cx="-52" cy="-15" r="3" fill="white" opacity="0.4"/>

    <!-- 1st place podium (taller) -->
    <rect x="-24" y="-18" width="48" height="58" rx="4" fill="#FFC800" stroke="#D4A600" stroke-width="2"/>
    <text x="0" y="15" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="18">1</text>
    <!-- Gold circle avatar -->
    <circle cx="0" cy="-32" r="14" fill="#FFC800" stroke="#D4A600" stroke-width="2"/>
    <circle cx="0" cy="-32" r="10" fill="#FFE066"/>
    <!-- Crown on 1st -->
    <g transform="translate(0, -52)">
      <path d="M-10,6 L-8,-3 L-4,2 L0,-6 L4,2 L8,-3 L10,6 Z" fill="#FFC800" stroke="#D4A600" stroke-width="1.5"/>
      <circle cx="-8" cy="-3" r="2" fill="#FF9600"/>
      <circle cx="0" cy="-6" r="2" fill="#FF9600"/>
      <circle cx="8" cy="-3" r="2" fill="#FF9600"/>
    </g>

    <!-- 3rd place podium -->
    <rect x="26" y="8" width="44" height="32" rx="4" fill="#FF9600" stroke="#D47E00" stroke-width="2"/>
    <text x="48" y="30" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="16">3</text>
    <!-- Bronze circle avatar -->
    <circle cx="48" cy="-5" r="12" fill="#CD7F32" stroke="#A66828" stroke-width="2"/>
    <circle cx="44" cy="-8" r="3" fill="white" opacity="0.3"/>
  </g>

  <!-- === ADDITIONAL GAMIFICATION ELEMENTS === -->

  <!-- Coin - left side -->
  <g transform="translate(45, 210)">
    <circle cx="0" cy="0" r="16" fill="#FFC800" stroke="#D4A600" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="11" stroke="#D4A600" stroke-width="1.5" fill="none"/>
    <text x="0" y="5" text-anchor="middle" fill="#D4A600" font-family="Arial, sans-serif" font-weight="bold" font-size="13">$</text>
    <!-- Coin shine -->
    <path d="M-6,-10 Q0,-14 6,-10" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Heart / life -->
  <g transform="translate(420, 200)">
    <path d="M0,10 C0,10 -16,-2 -16,-12 C-16,-18 -10,-22 -5,-18 L0,-12 L5,-18 C10,-22 16,-18 16,-12 C16,-2 0,10 0,10Z" fill="#FF4B4B" stroke="#D43D3D" stroke-width="2"/>
    <path d="M-8,-12 Q-4,-16 0,-12" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Lightning bolt (energy/power) -->
  <g transform="translate(390, 170)">
    <path d="M5,-18 L-3,-2 L4,-2 L-5,18 L3,2 L-4,2 Z" fill="#FFC800" stroke="#D4A600" stroke-width="2"/>
  </g>

  <!-- Shield badge -->
  <g transform="translate(55, 290)">
    <path d="M0,-20 L18,-12 L18,5 Q18,18 0,24 Q-18,18 -18,5 L-18,-12 Z" fill="#1CB0F6" stroke="#0D8ECF" stroke-width="2"/>
    <path d="M0,-14 L12,-8 L12,3 Q12,12 0,16 Q-12,12 -12,3 L-12,-8 Z" fill="#3DC2FF"/>
    <polyline points="-4,2 -1,6 6,-2" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Target/bullseye -->
  <g transform="translate(430, 280)">
    <circle cx="0" cy="0" r="16" fill="white" stroke="#FF4B4B" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="10" fill="white" stroke="#FF4B4B" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#FF4B4B"/>
  </g>

  <!-- === DECORATIVE SPARKLES AND ELEMENTS === -->

  <!-- Stars scattered -->
  <g transform="translate(130, 50) scale(0.6)">
    <path d="M0,-14 L3,-4 L14,-4 L5,3 L8,14 L0,7 L-8,14 L-5,3 L-14,-4 L-3,-4 Z" fill="#FFC800" stroke="#D4A600" stroke-width="1.5"/>
  </g>
  <g transform="translate(25, 150) scale(0.45)">
    <path d="M0,-14 L3,-4 L14,-4 L5,3 L8,14 L0,7 L-8,14 L-5,3 L-14,-4 L-3,-4 Z" fill="#FF9600"/>
  </g>
  <g transform="translate(440, 50) scale(0.5)">
    <path d="M0,-14 L3,-4 L14,-4 L5,3 L8,14 L0,7 L-8,14 L-5,3 L-14,-4 L-3,-4 Z" fill="#FFC800"/>
  </g>
  <g transform="translate(100, 320) scale(0.4)">
    <path d="M0,-14 L3,-4 L14,-4 L5,3 L8,14 L0,7 L-8,14 L-5,3 L-14,-4 L-3,-4 Z" fill="#FFC800"/>
  </g>

  <!-- Plus sparkles -->
  <g transform="translate(155, 180)" stroke="#FFC800" stroke-width="2.5" stroke-linecap="round">
    <line x1="-5" y1="0" x2="5" y2="0"/>
    <line x1="0" y1="-5" x2="0" y2="5"/>
  </g>
  <g transform="translate(310, 180)" stroke="#1CB0F6" stroke-width="2" stroke-linecap="round">
    <line x1="-4" y1="0" x2="4" y2="0"/>
    <line x1="0" y1="-4" x2="0" y2="4"/>
  </g>
  <g transform="translate(25, 70)" stroke="#FF9600" stroke-width="2" stroke-linecap="round">
    <line x1="-4" y1="0" x2="4" y2="0"/>
    <line x1="0" y1="-4" x2="0" y2="4"/>
  </g>

  <!-- Small dots -->
  <circle cx="170" cy="30" r="3" fill="#FF9600" opacity="0.6"/>
  <circle cx="300" cy="45" r="4" fill="#1CB0F6" opacity="0.5"/>
  <circle cx="108" cy="160" r="3" fill="#FFC800" opacity="0.5"/>
  <circle cx="350" cy="240" r="3" fill="#FF4B4B" opacity="0.5"/>
  <circle cx="135" cy="290" r="3" fill="#58CC02" opacity="0.5"/>
  <circle cx="400" cy="340" r="2.5" fill="#FFC800" opacity="0.4"/>
  <circle cx="50" cy="60" r="3" fill="#1CB0F6" opacity="0.4"/>
  <circle cx="450" cy="150" r="2" fill="#58CC02" opacity="0.5"/>

  <!-- Diamond sparkles -->
  <rect x="325" y="150" width="7" height="7" rx="1" fill="#FFC800" transform="rotate(45, 328.5, 153.5)" opacity="0.6"/>
  <rect x="110" y="240" width="5" height="5" rx="1" fill="#FF9600" transform="rotate(45, 112.5, 242.5)" opacity="0.5"/>

  <!-- Confetti pieces -->
  <rect x="170" y="100" width="8" height="4" rx="2" fill="#FF4B4B" transform="rotate(30, 174, 102)" opacity="0.6"/>
  <rect x="290" y="110" width="8" height="4" rx="2" fill="#1CB0F6" transform="rotate(-20, 294, 112)" opacity="0.6"/>
  <rect x="155" y="135" width="6" height="3" rx="1.5" fill="#58CC02" transform="rotate(45, 158, 136.5)" opacity="0.5"/>
  <rect x="305" y="135" width="6" height="3" rx="1.5" fill="#CE82FF" transform="rotate(-35, 308, 136.5)" opacity="0.5"/>
  <rect x="130" y="115" width="7" height="3" rx="1.5" fill="#FFC800" transform="rotate(60, 133.5, 116.5)" opacity="0.5"/>
</svg>