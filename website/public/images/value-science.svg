<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" fill="none">
  <!-- Background glows -->
  <circle cx="200" cy="160" r="130" fill="#1CB0F6" opacity="0.06"/>
  <circle cx="300" cy="220" r="100" fill="#CE82FF" opacity="0.05"/>

  <!-- === BRAIN === -->
  <!-- Brain base shape - left hemisphere -->
  <path d="M175,100
    C145,100 120,120 118,150
    C116,175 128,195 148,208
    C140,218 138,235 150,248
    C162,261 182,258 195,248
    L195,170
    C195,140 185,110 175,100Z"
    fill="#CE82FF" stroke="#A85CD4" stroke-width="2.5"/>

  <!-- Brain left hemisphere folds -->
  <path d="M140,130 Q160,140 150,160" stroke="#A85CD4" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M130,155 Q150,162 145,180" stroke="#A85CD4" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M135,190 Q158,195 155,215" stroke="#A85CD4" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M155,220 Q170,228 168,242" stroke="#A85CD4" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Brain base shape - right hemisphere -->
  <path d="M215,100
    C245,100 270,120 272,150
    C274,175 262,195 242,208
    C250,218 252,235 240,248
    C228,261 208,258 195,248
    L195,170
    C195,140 205,110 215,100Z"
    fill="#DCA0FF" stroke="#A85CD4" stroke-width="2.5"/>

  <!-- Brain right hemisphere folds -->
  <path d="M250,130 Q230,140 240,160" stroke="#A85CD4" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M260,155 Q240,162 245,180" stroke="#A85CD4" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M255,190 Q232,195 235,215" stroke="#A85CD4" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M235,220 Q220,228 222,242" stroke="#A85CD4" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Brain center line -->
  <line x1="195" y1="105" x2="195" y2="248" stroke="#A85CD4" stroke-width="2" opacity="0.4"/>

  <!-- Brain highlight -->
  <path d="M160,112 Q170,108 180,112" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M145,135 Q150,130 155,135" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- === NEURAL CONNECTIONS / SPARKLES from brain === -->

  <!-- Neural node dots -->
  <circle cx="100" cy="120" r="6" fill="#1CB0F6" stroke="#0D8ECF" stroke-width="2"/>
  <circle cx="85" cy="180" r="5" fill="#CE82FF" stroke="#A85CD4" stroke-width="1.5"/>
  <circle cx="110" cy="250" r="5" fill="#58CC02" stroke="#3BA302" stroke-width="1.5"/>
  <circle cx="280" cy="105" r="5" fill="#1CB0F6" stroke="#0D8ECF" stroke-width="1.5"/>
  <circle cx="300" cy="170" r="6" fill="#CE82FF" stroke="#A85CD4" stroke-width="2"/>
  <circle cx="285" cy="245" r="5" fill="#58CC02" stroke="#3BA302" stroke-width="1.5"/>

  <!-- Neural connection lines -->
  <line x1="118" y1="130" x2="100" y2="120" stroke="#1CB0F6" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
  <line x1="120" y1="175" x2="85" y2="180" stroke="#CE82FF" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
  <line x1="135" y1="240" x2="110" y2="250" stroke="#58CC02" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
  <line x1="265" y1="115" x2="280" y2="105" stroke="#1CB0F6" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
  <line x1="272" y1="170" x2="300" y2="170" stroke="#CE82FF" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
  <line x1="255" y1="240" x2="285" y2="245" stroke="#58CC02" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>

  <!-- Tiny neural dots along connections -->
  <circle cx="108" cy="125" r="2" fill="#1CB0F6" opacity="0.6"/>
  <circle cx="102" cy="178" r="2" fill="#CE82FF" opacity="0.6"/>
  <circle cx="122" cy="246" r="2" fill="#58CC02" opacity="0.6"/>
  <circle cx="273" cy="109" r="2" fill="#1CB0F6" opacity="0.6"/>
  <circle cx="286" cy="170" r="2" fill="#CE82FF" opacity="0.6"/>
  <circle cx="270" cy="243" r="2" fill="#58CC02" opacity="0.6"/>

  <!-- Sparkle bursts on brain -->
  <g transform="translate(170, 95)">
    <line x1="0" y1="-8" x2="0" y2="-14" stroke="#FFC800" stroke-width="2" stroke-linecap="round"/>
    <line x1="6" y1="-5" x2="10" y2="-10" stroke="#FFC800" stroke-width="2" stroke-linecap="round"/>
    <line x1="-6" y1="-5" x2="-10" y2="-10" stroke="#FFC800" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(225, 92)">
    <line x1="0" y1="-8" x2="0" y2="-13" stroke="#FFC800" stroke-width="2" stroke-linecap="round"/>
    <line x1="5" y1="-4" x2="9" y2="-8" stroke="#FFC800" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="-4" x2="-9" y2="-8" stroke="#FFC800" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- === CLOCK / CALENDAR (spaced repetition) === -->
  <g transform="translate(370, 140)">
    <!-- Clock body -->
    <circle cx="0" cy="0" r="48" fill="white" stroke="#1CB0F6" stroke-width="3"/>
    <circle cx="0" cy="0" r="42" fill="#F0F9FF"/>
    <!-- Clock ticks -->
    <line x1="0" y1="-38" x2="0" y2="-32" stroke="#1CB0F6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="38" x2="0" y2="32" stroke="#1CB0F6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-38" y1="0" x2="-32" y2="0" stroke="#1CB0F6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="38" y1="0" x2="32" y2="0" stroke="#1CB0F6" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Minor ticks -->
    <line x1="19" y1="-33" x2="16" y2="-28" stroke="#1CB0F6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="33" y1="-19" x2="28" y2="-16" stroke="#1CB0F6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="33" y1="19" x2="28" y2="16" stroke="#1CB0F6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="19" y1="33" x2="16" y2="28" stroke="#1CB0F6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-19" y1="33" x2="-16" y2="28" stroke="#1CB0F6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-33" y1="19" x2="-28" y2="16" stroke="#1CB0F6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-33" y1="-19" x2="-28" y2="-16" stroke="#1CB0F6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-19" y1="-33" x2="-16" y2="-28" stroke="#1CB0F6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Clock hands -->
    <line x1="0" y1="2" x2="0" y2="-24" stroke="#4B4B4B" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="2" x2="18" y2="-10" stroke="#4B4B4B" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="#1CB0F6" stroke="#0D8ECF" stroke-width="1.5"/>

    <!-- Circular arrow (repetition symbol) -->
    <path d="M34,30 A45,45 0 0,1 -20,42" stroke="#58CC02" stroke-width="3" fill="none" stroke-linecap="round"/>
    <polygon points="-20,36 -20,48 -12,42" fill="#58CC02"/>
  </g>

  <!-- Calendar days below clock -->
  <g transform="translate(345, 220)">
    <rect x="0" y="0" width="55" height="44" rx="6" fill="white" stroke="#1CB0F6" stroke-width="2"/>
    <rect x="0" y="0" width="55" height="14" rx="6" fill="#1CB0F6"/>
    <rect x="0" y="6" width="55" height="8" fill="#1CB0F6"/>
    <!-- Calendar dots (days) -->
    <circle cx="14" cy="24" r="3" fill="#CE82FF"/>
    <circle cx="28" cy="24" r="3" fill="#E0E0E0"/>
    <circle cx="42" cy="24" r="3" fill="#E0E0E0"/>
    <circle cx="14" cy="36" r="3" fill="#E0E0E0"/>
    <circle cx="28" cy="36" r="3" fill="#58CC02"/>
    <circle cx="42" cy="36" r="3" fill="#E0E0E0"/>
  </g>

  <!-- Spacing curve connecting brain to clock -->
  <path d="M270,150 Q300,130 322,140" stroke="#1CB0F6" stroke-width="2" fill="none" stroke-dasharray="5,4" opacity="0.4"/>

  <!-- === FLOATING FLASHCARDS === -->

  <!-- Flashcard stack hint - behind flashcard 1 -->
  <g transform="translate(35, 35) rotate(-12)" opacity="0.4">
    <rect x="0" y="0" width="65" height="45" rx="8" fill="white" stroke="#1CB0F6" stroke-width="1.5"/>
  </g>

  <!-- Flashcard 1 - top left -->
  <g transform="translate(30, 30) rotate(-8)">
    <rect x="0" y="0" width="65" height="45" rx="8" fill="white" stroke="#1CB0F6" stroke-width="2"/>
    <line x1="10" y1="14" x2="55" y2="14" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="24" x2="45" y2="24" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="34" x2="38" y2="34" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round"/>
    <circle cx="55" cy="35" r="4" fill="#58CC02" opacity="0.6"/>
  </g>

  <!-- Flashcard 2 - top center-right -->
  <g transform="translate(280, 25) rotate(5)">
    <rect x="0" y="0" width="60" height="42" rx="8" fill="white" stroke="#CE82FF" stroke-width="2"/>
    <line x1="10" y1="13" x2="50" y2="13" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="23" x2="42" y2="23" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round"/>
    <circle cx="50" cy="32" r="4" fill="#CE82FF" opacity="0.5"/>
  </g>

  <!-- Flashcard 3 - bottom left -->
  <g transform="translate(40, 280) rotate(6)">
    <rect x="0" y="0" width="58" height="40" rx="7" fill="white" stroke="#58CC02" stroke-width="2"/>
    <line x1="10" y1="12" x2="48" y2="12" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="22" x2="40" y2="22" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round"/>
    <polyline points="40,30 44,35 52,25" stroke="#58CC02" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Flashcard 4 - bottom right -->
  <g transform="translate(370, 285) rotate(-5)">
    <rect x="0" y="0" width="55" height="38" rx="7" fill="white" stroke="#1CB0F6" stroke-width="2"/>
    <line x1="8" y1="12" x2="47" y2="12" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="22" x2="38" y2="22" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round"/>
    <circle cx="10" cy="10" r="2" fill="#1CB0F6" opacity="0.4"/>
  </g>

  <!-- === DECORATIVE ELEMENTS === -->

  <!-- Stars -->
  <g transform="translate(60, 150) scale(0.5)">
    <path d="M0,-14 L3,-4 L14,-4 L5,3 L8,14 L0,7 L-8,14 L-5,3 L-14,-4 L-3,-4 Z" fill="#FFC800"/>
  </g>
  <g transform="translate(310, 290) scale(0.5)">
    <path d="M0,-14 L3,-4 L14,-4 L5,3 L8,14 L0,7 L-8,14 L-5,3 L-14,-4 L-3,-4 Z" fill="#FFC800"/>
  </g>
  <g transform="translate(440, 55) scale(0.4)">
    <path d="M0,-14 L3,-4 L14,-4 L5,3 L8,14 L0,7 L-8,14 L-5,3 L-14,-4 L-3,-4 Z" fill="#FFC800"/>
  </g>

  <!-- Plus sparkles -->
  <g transform="translate(130, 45)" stroke="#CE82FF" stroke-width="2.5" stroke-linecap="round">
    <line x1="-5" y1="0" x2="5" y2="0"/>
    <line x1="0" y1="-5" x2="0" y2="5"/>
  </g>
  <g transform="translate(435, 300)" stroke="#1CB0F6" stroke-width="2" stroke-linecap="round">
    <line x1="-4" y1="0" x2="4" y2="0"/>
    <line x1="0" y1="-4" x2="0" y2="4"/>
  </g>
  <g transform="translate(15, 230)" stroke="#58CC02" stroke-width="2" stroke-linecap="round">
    <line x1="-4" y1="0" x2="4" y2="0"/>
    <line x1="0" y1="-4" x2="0" y2="4"/>
  </g>

  <!-- Small dots -->
  <circle cx="50" cy="210" r="3" fill="#1CB0F6" opacity="0.5"/>
  <circle cx="320" cy="45" r="3" fill="#CE82FF" opacity="0.5"/>
  <circle cx="200" cy="310" r="4" fill="#58CC02" opacity="0.4"/>
  <circle cx="430" cy="240" r="3" fill="#CE82FF" opacity="0.5"/>
  <circle cx="160" cy="290" r="2.5" fill="#1CB0F6" opacity="0.4"/>
  <circle cx="250" cy="330" r="3" fill="#CE82FF" opacity="0.3"/>

  <!-- Diamond sparkles -->
  <rect x="75" y="268" width="6" height="6" rx="1" fill="#CE82FF" transform="rotate(45, 78, 271)" opacity="0.5"/>
  <rect x="410" y="195" width="5" height="5" rx="1" fill="#1CB0F6" transform="rotate(45, 412.5, 197.5)" opacity="0.5"/>

  <!-- Infinity/loop symbol (spaced repetition) near brain bottom -->
  <g transform="translate(195, 275)">
    <path d="M-15,0 C-15,-10 -5,-10 0,0 C5,10 15,10 15,0 C15,-10 5,-10 0,0 C-5,10 -15,10 -15,0Z"
      stroke="#CE82FF" stroke-width="2.5" fill="none"/>
  </g>

  <!-- Small lightbulb (insight) -->
  <g transform="translate(70, 95)">
    <circle cx="0" cy="0" r="9" fill="#FFC800" stroke="#D4A600" stroke-width="1.5"/>
    <rect x="-3" y="8" width="6" height="4" rx="1.5" fill="#D4A600"/>
    <line x1="0" y1="-14" x2="0" y2="-18" stroke="#FFC800" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10" y1="-7" x2="13" y2="-10" stroke="#FFC800" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-10" y1="-7" x2="-13" y2="-10" stroke="#FFC800" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Progress dots (representing spaced intervals) -->
  <g transform="translate(310, 315)">
    <circle cx="0" cy="0" r="4" fill="#CE82FF"/>
    <circle cx="18" cy="0" r="4" fill="#CE82FF" opacity="0.7"/>
    <circle cx="40" cy="0" r="4" fill="#CE82FF" opacity="0.45"/>
    <circle cx="66" cy="0" r="4" fill="#CE82FF" opacity="0.25"/>
    <line x1="4" y1="0" x2="14" y2="0" stroke="#CE82FF" stroke-width="1.5" opacity="0.5"/>
    <line x1="22" y1="0" x2="36" y2="0" stroke="#CE82FF" stroke-width="1.5" opacity="0.35"/>
    <line x1="44" y1="0" x2="62" y2="0" stroke="#CE82FF" stroke-width="1.5" opacity="0.2"/>
  </g>
</svg>